name: Torrent to VikingFile Uploader

on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: 'Magnet link or direct .torrent URL'
        required: true
        type: string
      viking_user_hash:
        description: 'Your VikingFile user hash (leave empty for anonymous)'
        required: false
        type: string
      viking_folder:
        description: 'Folder on VikingFile (optional)'
        required: false
        type: string

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: 1. Install aria2
        shell: pwsh
        run: |
          Write-Host "Downloading aria2..."
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $aria2Url -OutFile "aria2.zip"
          Expand-Archive -Path "aria2.zip" -DestinationPath "." -Force
          Move-Item -Path "aria2-1.37.0-win-64bit-build1" -Destination "aria2" -Force
          Write-Host "aria2 installed [OK]"

      - name: 2. Download and Patch VikingFile uploader (urllib fix)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Hexdare/VikingFile-Upload/main/upload.py" -OutFile "upload.py"
          
          # === CORRECT PATCH for urllib (this is what VikingFile script actually uses) ===
          $content = Get-Content "upload.py" -Raw
          $patch = @'
# === GLOBAL USER-AGENT PATCH (bypasses GitHub IP block) ===
import urllib.request
opener = urllib.request.build_opener()
opener.addheaders = [('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36')]
urllib.request.install_opener(opener)
'@
          $content = $patch + "`n`n" + $content
          $content | Set-Content "upload.py" -Encoding utf8
          Write-Host "VikingFile uploader patched with real browser User-Agent [OK]"
          Write-Host "(Patch added at the very top of the script)"

      - name: 3. Create downloads folder
        shell: pwsh
        run: |
          New-Item -Path "downloads" -ItemType Directory -Force | Out-Null
          Write-Host "Downloads folder created [OK]"

      - name: 4. Download torrent with aria2
        shell: pwsh
        run: |
          $link = "${{ github.event.inputs.torrent_link }}"
          Write-Host "=== STARTING TORRENT DOWNLOAD ==="
          Write-Host "Link length: $($link.Length) characters"
          
          $ariaArgs = @(
              "--dir=downloads",
              "--seed-time=0",
              "--max-upload-limit=0",
              "--enable-dht=true",
              "--bt-enable-lpd=true",
              "--allow-overwrite=true",
              "--file-allocation=none",
              "--console-log-level=notice",
              "--max-connection-per-server=16",
              "--split=16",
              "--min-split-size=10M",
              $link
          )
          
          & .\aria2\aria2c.exe @ariaArgs
          Write-Host "=== TORRENT DOWNLOAD FINISHED ==="

      - name: 5. Upload all files to VikingFile.com
        shell: pwsh
        run: |
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"
          
          Write-Host "=== UPLOADING TO VIKINGFILE ==="
          
          Get-ChildItem -Path "downloads" -Recurse -File | 
            Where-Object { $_.Extension -ne '.aria2' } | 
            ForEach-Object {
              $file = $_.FullName
              Write-Host "`nUploading: $($_.Name) ($( [math]::Round($_.Length/1MB,2) ) MB)"
              
              $argsList = @($file)
              if ($userHash) { $argsList += $userHash }
              if ($folder)   { $argsList += $folder }
              
              python upload.py @argsList
            }
          
          Write-Host "`n=== ALL DONE! Check the links above ==="
