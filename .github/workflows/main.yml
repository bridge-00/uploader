name: Torrent to VikingFile Uploader

on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: "Magnet link or direct .torrent URL"
        required: true
        type: string
      viking_user_hash:
        description: "Your VikingFile user hash (leave empty for anonymous)"
        required: false
        type: string
      viking_folder:
        description: "Folder on VikingFile (optional)"
        required: false
        type: string

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: 1. Install aria2
        shell: pwsh
        run: |
          Write-Host "Downloading aria2..."
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $aria2Url -OutFile "aria2.zip"
          Expand-Archive -Path "aria2.zip" -DestinationPath "." -Force
          Move-Item -Path "aria2-1.37.0-win-64bit-build1" -Destination "aria2" -Force
          Write-Host "aria2 installed [OK]"

      - name: 2. Ensure Python is available
        shell: pwsh
        run: |
          python --version

      - name: 3. Download and Patch VikingFile uploader
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Hexdare/VikingFile-Upload/main/upload.py" -OutFile "upload.py"
          
          $content = Get-Content "upload.py" -Raw

          $patch = "# === GLOBAL USER-AGENT PATCH ===`n" +
                   "import urllib.request`n" +
                   "opener = urllib.request.build_opener()`n" +
                   "opener.addheaders = [('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36')]`n" +
                   "urllib.request.install_opener(opener)`n"

          $content = $patch + "`n`n" + $content
          $content | Set-Content "upload.py" -Encoding utf8

          Write-Host "Uploader patched [OK]"

      - name: 4. Create downloads folder
        shell: pwsh
        run: |
          New-Item -Path "downloads" -ItemType Directory -Force | Out-Null
          Write-Host "Downloads folder ready [OK]"

      - name: 5. Download torrent with aria2
        shell: pwsh
        run: |
          $link = "${{ github.event.inputs.torrent_link }}"
          
          Write-Host "=== START DOWNLOAD ==="
          
          & .\aria2\aria2c.exe `
            --dir=downloads `
            --seed-time=0 `
            --max-upload-limit=0 `
            --enable-dht=true `
            --bt-enable-lpd=true `
            --allow-overwrite=true `
            --file-allocation=none `
            --console-log-level=notice `
            --max-connection-per-server=16 `
            --split=16 `
            --min-split-size=10M `
            $link

          Write-Host "=== DOWNLOAD COMPLETE ==="

      - name: 6. Upload files to VikingFile
        shell: pwsh
        run: |
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"

          Write-Host "=== START UPLOAD ==="

          Get-ChildItem "downloads" -Recurse -File |
            Where-Object { $_.Extension -ne ".aria2" } |
            ForEach-Object {
              $file = $_.FullName
              $size = [math]::Round($_.Length / 1MB, 2)

              Write-Host "`nUploading: $($_.Name) ($size MB)"

              $args = @($file)
              if ($userHash) { $args += $userHash }
              if ($folder)   { $args += $folder }

              python upload.py @args
            }

          Write-Host "`n=== ALL DONE ==="
