name: Torrent to VikingFile Uploader

on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: "Magnet link or .torrent URL"
        required: true
      viking_user_hash:
        required: false
        default: ""
      viking_folder:
        required: false
        default: ""
      telegram_chat_id:
        required: false
        default: ""

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: Install aria2
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip -OutFile aria2.zip
          Expand-Archive aria2.zip -DestinationPath .
          Move-Item aria2-1.37.0-win-64bit-build1 aria2
          Write-Host "✅ aria2 installed"

      - name: Prepare environment
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Path downloads -Force | Out-Null
          Write-Host "✅ Environment ready"

      - name: Download torrent
        shell: pwsh
        run: |
          $link = "${{ github.event.inputs.torrent_link }}"

          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "📥 DOWNLOADING"
          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "Link: $link"

          .\aria2\aria2c.exe `
            --dir=downloads `
            --seed-time=0 `
            --enable-dht=true `
            --bt-enable-lpd=true `
            --max-connection-per-server=16 `
            --split=16 `
            --file-allocation=none `
            --console-log-level=notice `
            "$link"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Download failed with exit code $LASTEXITCODE"
            exit 1
          }

          Write-Host "✅ Download complete"

          # Show what was downloaded
          Write-Host "━━━ Downloaded files ━━━"
          Get-ChildItem downloads -Recurse -File | ForEach-Object {
            Write-Host "  📄 $($_.FullName) ($([math]::Round($_.Length / 1MB, 2)) MB)"
          }

      - name: Upload to VikingFile and notify Telegram
        shell: pwsh
        run: |
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"
          $chatId   = "${{ github.event.inputs.telegram_chat_id }}"
          $botToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"

          # ── Download the uploader script ──
          Invoke-WebRequest https://raw.githubusercontent.com/Hexdare/VikingFile-Upload/main/upload.py -OutFile upload.py
          Write-Host "✅ Uploader script downloaded"

          # ── Find all downloaded files (skip aria2 temp files) ──
          $files = Get-ChildItem downloads -Recurse -File | Where-Object { $_.Extension -ne ".aria2" }

          if ($files.Count -eq 0) {
            Write-Host "❌ No files found in downloads folder!"
            if ($chatId -and $botToken) {
              Invoke-RestMethod `
                -Uri "https://api.telegram.org/bot$botToken/sendMessage" `
                -Method Post `
                -ContentType "application/json" `
                -Body (ConvertTo-Json @{ chat_id = $chatId; text = "❌ TORVIKING: No files were downloaded. Torrent may be dead." })
            }
            exit 1
          }

          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "📤 UPLOADING $($files.Count) file(s)"
          Write-Host "━━━━━━━━━━━━━━━━━━━━"

          $uploadedLinks = @()
          $failedFiles = @()

          foreach ($f in $files) {
            Write-Host ""
            Write-Host "📄 Uploading: $($f.Name) ($([math]::Round($f.Length / 1MB, 2)) MB)"

            # ── Build argument list (DO NOT use $args - it's reserved in PowerShell!) ──
            $uploadArgs = @($f.FullName)
            if ($userHash) { $uploadArgs += $userHash }
            if ($folder)   { $uploadArgs += $folder }

            Write-Host "Running: python upload.py $($uploadArgs -join ' ')"

            # ── Run the uploader and capture output ──
            $rawOutput = python upload.py @uploadArgs 2>&1 | Out-String

            # ── Strip ANSI escape codes from output for clean parsing ──
            $cleanOutput = $rawOutput -replace '\x1b\[[0-9;]*m', '' -replace '\x1b\[\?[0-9;]*[a-zA-Z]', ''

            Write-Host "──── UPLOADER OUTPUT (clean) ────"
            Write-Host $cleanOutput
            Write-Host "─────────────────────────────────"

            if ($LASTEXITCODE -ne 0) {
              Write-Host "⚠️ Upload process exited with code $LASTEXITCODE"
              $failedFiles += $f.Name
              continue
            }

            # ── Extract the VikingFile link ──
            $found = $false
            $lines = $cleanOutput -split "`n"

            foreach ($line in $lines) {
              $trimmed = $line.Trim()

              # Match vikingfile.com URLs specifically
              if ($trimmed -match '(https?://[^\s]*vikingfile\.com[^\s]*)') {
                $extractedLink = $Matches[1]
                $uploadedLinks += "🔗 $($f.Name): $extractedLink"
                Write-Host "✅ Found link: $extractedLink"
                $found = $true
                break
              }
            }

            # Fallback: try to match any URL if vikingfile wasn't found
            if (-not $found) {
              foreach ($line in $lines) {
                $trimmed = $line.Trim()
                if ($trimmed -match '(https?://[^\s]+)') {
                  $extractedLink = $Matches[1]
                  $uploadedLinks += "🔗 $($f.Name): $extractedLink"
                  Write-Host "✅ Found link (fallback): $extractedLink"
                  $found = $true
                  break
                }
              }
            }

            if (-not $found) {
              Write-Host "⚠️ No link detected for: $($f.Name)"
              $failedFiles += $f.Name
            }
          }

          # ── Summary ──
          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "📊 SUMMARY"
          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "Total files:  $($files.Count)"
          Write-Host "Links found:  $($uploadedLinks.Count)"
          Write-Host "Failed files: $($failedFiles.Count)"

          # ── Send Telegram notification ──
          if ($chatId -and $botToken) {
            if ($uploadedLinks.Count -gt 0) {
              $msg = "⚔️ TORVIKING COMPLETE!`n`n" + ($uploadedLinks -join "`n")
              if ($failedFiles.Count -gt 0) {
                $msg += "`n`n⚠️ Failed: " + ($failedFiles -join ", ")
              }
            } else {
              $msg = "⚠️ TORVIKING: Upload finished but no links were detected.`n`nFiles attempted: $($files.Count)`nCheck the GitHub Actions logs for details."
            }

            try {
              Invoke-RestMethod `
                -Uri "https://api.telegram.org/bot$botToken/sendMessage" `
                -Method Post `
                -ContentType "application/json" `
                -Body (ConvertTo-Json @{
                  chat_id = $chatId
                  text = $msg
                  parse_mode = "Markdown"
                })
              Write-Host "📨 Telegram notification sent"
            } catch {
              Write-Host "⚠️ Failed to send Telegram message: $_"
              # Try again without parse_mode in case markdown breaks
              try {
                Invoke-RestMethod `
                  -Uri "https://api.telegram.org/bot$botToken/sendMessage" `
                  -Method Post `
                  -ContentType "application/json" `
                  -Body (ConvertTo-Json @{
                    chat_id = $chatId
                    text = $msg
                  })
                Write-Host "📨 Telegram notification sent (plain text)"
              } catch {
                Write-Host "❌ Telegram notification failed completely: $_"
              }
            }
          } else {
            Write-Host "⚠️ No Telegram chat ID or bot token — skipping notification"
          }

          # Fail the workflow if no links were found
          if ($uploadedLinks.Count -eq 0) {
            Write-Host "❌ No upload links were obtained"
            exit 1
          }
